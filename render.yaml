services:
  - type: web
    name: tracklab-bmx
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_WATTBIKE_BRIDGE_URL
        sync: false
      - key: VITE_TRACKLAB_MULTIPLAYER_URL
        sync: false
